  observations: |
    Most original entries verified as real businesses or established practitioners with
    websites, Yelp pages, and Google Maps listings — not directory scrapes. Several psychics
    (Rachel Norway, Michael Sue Scott, Carolan/Psychic Medium of SRQ, Masami/My Star Angels)
    operate from residential/private addresses in Sarasota and primarily take phone/Zoom
    appointments rather than walk-ins. Two were reclassified: Psychic Medium Valentina is
    based in Clearwater (not Sarasota), Hestia Wellness is Tampa Bay/Palm Harbor-based, and
    Cynthia Ann is in Bradenton (Manatee County). Pixie Dust confirmed moved from 1476 Main
    St to 40 Sarasota Center Blvd (Unit 106). Discovered five additional real, long-established
    Sarasota-area metaphysical/spiritual businesses — including the 1949-founded Sarasota
    Center of Light (Spiritualist church lineage).

